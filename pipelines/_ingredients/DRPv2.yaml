description: |
  Base pipeline for Data Release Production.

  This pipeline includes all production common to most instruments and all
  "core" analysis tasks.  Most downstream pipelines will be defined as subsets
  that exclude labels they do not need.

  Never run this pipeline or any of its subsets directly; always use those in
  the 'pipelines' directory (or create a custom one) instead.

# TODO[DM-47320]: temporary; only for dev pipeline-graph building {
instrument: lsst.obs.subaru.HyperSuprimeCam
# } END_TODO

imports:
  # TODO[DM-47320]: rename/move for consistency with the others? {
  - location: $ANALYSIS_TOOLS_DIR/pipelines/exposureQualityCore.yaml
  # } END_TODO
  - location: $DRP_PIPE_DIR/pipelines/_ingredients/analysis-visit-initial.yaml
  - location: $DRP_PIPE_DIR/pipelines/_ingredients/analysis-associations-initial.yaml
  - location: $DRP_PIPE_DIR/pipelines/_ingredients/analysis-visit-recalibrated.yaml
  - location: $DRP_PIPE_DIR/pipelines/_ingredients/analysis-associations-recalibrated.yaml

tasks:
  # 1-initial production tasks
  isr: lsst.ip.isr.IsrTask
  calibrateImage:
    class: lsst.pipe.tasks.calibrateImage.CalibrateImageTask
    config:
      connections.stars_footprints: initial_stars_footprints_detector
      connections.stars: initial_stars_detector_raw
      connections.exposure: initial_visit_image
      connections.background: initial_visit_image_background
      do_calibrate_pixels: false
  transformInitialStars:
    class: lsst.pipe.tasks.postprocess.TransformSourceTableTask
    config:
      connections.inputCatalog: initial_stars_detector_raw
      connections.outputCatalog: initial_stars_detector
  consolidateInitialStars:
    class: lsst.pipe.tasks.postprocess.ConsolidateSourceTableTask
    config:
      connections.inputCatalogs: initial_stars_detector
      connections.outputCatalog: initial_stars
  consolidateVisitSummary:
    class: lsst.pipe.tasks.postprocess.ConsolidateVisitSummaryTask
    config:
      connections.calexp: initial_visit_image
      connections.visitSummary: initial_visit_summary
      connections.visitSummarySchema: initial_visit_summary_schema
  isolatedStarAssociation:
    class: lsst.pipe.tasks.isolatedStarAssociation.IsolatedStarAssociationTask
    config:
      connections.source_table_visit: initial_stars
      connections.isolated_star_sources: isolated_star_sources
      connections.isolated_star_cat: isolated_star_source_associations
  makePreliminaryVisitDetectorTable:
    class: lsst.pipe.tasks.postprocess.MakeCcdVisitTableTask
    config:
      connections.visitSummaryRefs: initial_visit_summary
      connections.outputCatalog: preliminary_visit_detectors
  makePreliminaryVisitTable:
    class: lsst.pipe.tasks.postprocess.MakeVisitTableTask
    config:
      connections.visitSummaries: initial_visit_summary
      connections.outputCatalog: preliminary_visits
  # 2-recalibration production tasks
  fgcmBuildFromIsolatedStars:
    class: lsst.fgcmcal.fgcmBuildFromIsolatedStars.FgcmBuildFromIsolatedStarsTask
    config:
      connections.isolated_star_cats: isolated_star_source_associations
      connections.isolated_star_sources: isolated_star_sources
      connections.visit_summaries: initial_visit_summary
  fgcmFitCycle:
    class: lsst.fgcmcal.fgcmFitCycle.FgcmFitCycleTask
    config:
      doMultipleCycles: true
  fgcmOutputProducts:
    class: lsst.fgcmcal.fgcmOutputProducts.FgcmOutputProductsTask
  gbdesAstrometricFit:
    class: lsst.drp.tasks.gbdesAstrometricFit.GbdesAstrometricFitTask
    config:
      connections.inputCatalogRefs: initial_stars
      connections.inputVisitSummaries: initial_visit_summary
  finalizeCharacterization:
    class: lsst.pipe.tasks.finalizeCharacterization.FinalizeCharacterizationTask
    config:
      connections.srcs: initial_stars_footprints_detector
      connections.src_schema: initial_stars_schema
      connections.calexps: initial_visit_image
      connections.isolated_star_cats: isolated_star_source_associations
      connections.isolated_star_sources: isolated_star_sources
  updateVisitSummary:
    class: lsst.drp.tasks.update_visit_summary.UpdateVisitSummaryTask
    config:
      connections.input_exposures: initial_visit_image
      connections.input_summary_schema: initial_visit_summary_schema
      connections.input_summary_catalog: initial_visit_summary
      connections.output_summary_schema: visit_summary_schema
      connections.output_summary_catalog: visit_summary
  recalibrateInitialStars:
    class: lsst.pipe.tasks.postprocess.WriteRecalibratedSourceTableTask
    config:
      connections.visitSummary: visit_summary
      connections.catalog: initial_stars_footprints_detector
      connections.outputCatalog: recalibrated_stars_detector_raw
  transformRecalibratedStars:
    class: lsst.pipe.tasks.postprocess.TransformSourceTableTask
    config:
      connections.inputCatalog: recalibrated_stars_detector_raw
      connections.outputCatalog: recalibrated_stars_detector
  consolidateRecalibratedStars:
    class: lsst.pipe.tasks.postprocess.ConsolidateSourceTableTask
    config:
      connections.inputCatalogs: recalibrated_stars_detector
      connections.outputCatalog: recalibrated_stars
  makeVisitDetectorTable:
    class: lsst.pipe.tasks.postprocess.MakeCcdVisitTableTask
    config:
      connections.visitSummaryRefs: visit_summary
      connections.outputCatalog: visit_detectors
  makeVisitTable:
    class: lsst.pipe.tasks.postprocess.MakeVisitTableTask
    config:
      connections.visitSummaries: visit_summary
      connections.outputCatalog: visits
  # 3-coadds production tasks
  makeWarp:
    class: lsst.pipe.tasks.makeWarp.MakeWarpTask
    config:
      connections.calExpList: initial_visit_image
      connections.backgroundList: initial_visit_image_background
      connections.visitSummary: visit_summary
      connections.direct: direct_warp
      connections.psfMatched: psf_matched_warp
      makePsfMatched: true
  selectDeepCoaddVisits:
    class: lsst.pipe.tasks.selectImages.BestSeeingSelectVisitsTask
    config:
      connections.visitSummaries: visit_summary
      connections.goodVisits: deep_coadd_visits
      # Maximum sensible default psf fwhm in arcseconds to use for a coadd
      maxPsfFwhm: 2.0
      # By default for deep coadds, use all input visits better than maxPsfFwhm
      nVisitsMax: -1
  selectTemplateCoaddVisits:
    class: lsst.pipe.tasks.selectImages.BestSeeingQuantileSelectVisitsTask
    config:
      connections.goodVisits: template_coadd_visits
  assembleDeepCoadd:
    class: lsst.drp.tasks.assemble_coadd.CompareWarpAssembleCoaddTask
    config:
      connections.inputWarps: direct_warp
      connections.psfMatchedWarps: psf_matched_warp
      connections.selectedVisits: deep_coadd_visits
      connections.coaddExposure: initial_deep_coadd
      connections.nImage: deep_coadd_n_image
      connections.inputMap: deep_coadd_input_map
      connections.templateCoadd: deep_coadd_compare_template
      doInputMap: true
      doSelectVisits: true
      doWriteArtifactMasks: true
      assembleStaticSkyModel.doSelectVisits: true
  assembleTemplateCoadd:
    class: lsst.drp.tasks.assemble_coadd.CompareWarpAssembleCoaddTask
    config:
      connections.inputWarps: direct_warp
      connections.psfMatchedWarps: psf_matched_warp
      connections.selectedVisits: template_coadd_visits
      connections.coaddExposure: template_coadd
      connections.nImage: template_coadd_n_image
      connections.inputMap: template_coadd_input_map
      connections.templateCoadd: template_coadd_compare_template
      doSelectVisits: true
      assembleStaticSkyModel.doSelectVisits: true
      doNImage: true
  healSparsePropertyMaps:
    class: lsst.pipe.tasks.healSparseMapping.HealSparsePropertyMapTask
    config:
      connections.input_maps: deep_coadd_input_map
      connections.coadd_exposures: initial_deep_coadd
      connections.visit_summaries: visit_summary
      # TODO[DM-47320]: we can't adjust this task's output dataset type names
      # to use the new conventions without code changes.
  detectObjects:
    class: lsst.pipe.tasks.multiBand.DetectCoaddSourcesTask
    config:
      connections.detectionSchema: object_detections_schema
      connections.exposure: initial_deep_coadd
      connections.outputBackgrounds: deep_coadd_background
      connections.outputSources: object_detections
      connections.outputExposure: deep_coadd
  mergeObjectDetections:
    class: lsst.pipe.tasks.mergeDetections.MergeDetectionsTask
    config:
      connections.schema: object_detections_schema
      connections.outputSchema: object_detections_merged_schema
      connections.outputPeakSchema: object_detections_peak_schema
      connections.catalogs: object_detections_merged
  deblendObjects:
    class: lsst.pipe.tasks.deblendCoaddSourcesPipeline.DeblendCoaddSourcesMultiTask
    config:
      connections.inputSchema: object_detections_merged_schema
      connections.peakSchema: object_detections_peak_schema
      connections.mergedDetections: object_detections_merged
      connections.coadds: deep_coadd
      # TODO[DM-47320]: the catalog that corresponds to this schema might be
      # soft deprecated and not written.  Is this the right name?  Should it go
      # away instead? {
      connections.outputSchema: object_deblends_schema
      # } END_TODO
      connections.deblendedCatalog: object_deblends
      connections.scarletModelData: object_deblend_model
  measureObjectsUnforced:
    class: lsst.pipe.tasks.multiBand.MeasureMergedCoaddSourcesTask
    config:
      connections.inputSchema: object_deblends_schema
      connections.outputSchema: object_unforced_schema
      connections.exposure: deep_coadd
      connections.visitCatalogs

  mergeMeasurements: lsst.pipe.tasks.mergeMeasurements.MergeMeasurementsTask
  writeObjectTable: lsst.pipe.tasks.postprocess.WriteObjectTableTask
  transformObjectTable: lsst.pipe.tasks.postprocess.TransformObjectCatalogTask
  consolidateObjectTable: lsst.pipe.tasks.postprocess.ConsolidateObjectTableTask
  forcedPhotCoadd: lsst.drp.tasks.forcedPhotCoadd.ForcedPhotCoaddTask

  consolidateHealSparsePropertyMaps: lsst.pipe.tasks.healSparseMapping.ConsolidateHealSparsePropertyMapTask


subsets:
  1a-initial-detectors:
    subset:
      - isr
      - calibrateImage
      - transformInitialStars
      - analyzeAmpOffsetMetadata
      - analyzeCalibrateImageMetadata
      - analyzeInitialVisitImageSummary
    description: |
      A step that processes raws to initial processed images and star catalogs.
      These all run per-detector and may be sharded by detector or visit.

      An instrument constraint is generally redundant but recommended.

      A skymap constraint is unnecessary and not recommended.

  1b-initial-consolidate-visits:
    subset:
      - consolidateInitialStars
      - consolidateVisitSummary
      - analyzeInitialStars
      - makeAnalysisInitialStarsAstrometricRefMatch
      - analyzeInitialStarsAstrometricRefMatch
      - makeAnalysisInitialStarsPhotometricRefMatch
      - analyzeInitialStarsPhotometricRefMatch
    description: |
      A step that consolidates per-detector initial star catalogs and metadata
      to full-focal-plane visit-level versions, and runs analysis on initial
      stars.

      A visit constraint may be used for sharding and may be useful in speeding
      up QuantumGraph generation.

      An instrument constraint is generally redundant but recommended.

      A skymap constraint is unnecessary and not recommended.

  1c-initial-consolidate-all-tracts:
    subset:
      - isolatedStarAssociation
      - analyzeInitialStarAssociations
    description: |
      A step that matches initial star catalogs (running over tracts) and
      runs analysis on those matches.

      Tract constraints may only be used for sharding; tracts with partial
      visit coverage must always be included.

      An instrument constraint is generally redundant but recommended.

      A skymap constraint is always necessary, to avoid running all tasks
      redundantly on all skymaps in the data repository.

  1d-initial-consolidate-global:
    subset:
      - makePreliminaryVisitDetectorTable
      - makePreliminaryVisitTable
      - makeAnalysisInitialStarAssociationsMetricTable
      - makeAnalysisInitialStarAssociationsSkyPlot
    description: |
      A step that consolidates visit[, detector] metadata and analysis into
      full-survey tables.

      This step's outputs are not consumed by downstream steps and may be
      dropped by pipelines that don't need a checkpoint before multi-epoch
      calibration.

      An instrument constraint is generally redundant but recommended.

      A skymap constraint is generally redundant but recommended.

  2a-recalibration-global:
    subset:
      - fgcmBuildFromIsolatedStars
      - fgcmFitCycle
      - fgcmOutputProducts
    description: |
      A step that runs survey-wide multi-visit calibration tasks.

      An instrument constraint is generally redundant but recommended.

      A skymap constraint is generally redundant but recommended.

  2b-recalibration-tracts:
    subset:
      - gbdesAstrometricFit
    description: |
      A step that runs tract-level multi-visit calibration tasks.

      A tract constraint may be used for sharding or avoiding partial-coverage
      tracts, and may be helpful in speeding up QuantumGraph generation.

      An instrument constraint is generally redundant but recommended.

      A skymap constraint is generally redundant but recommended.

  2c-recalibration-visits:
    subset:
      - finalizeCharacterization
      - updateVisitSummary
      - recalibrateInitialStars
      - transformRecalibratedStars
      - consolidateRecalibratedStars
      - analyzeRecalibratedStars
      - makeAnalysisRecalibratedStarsAstrometricRefMatch
      - analyzeRecalibratedStarsAstrometricRefMatch
      - makeAnalysisRecalibratedStarsPhotometricRefMatch
      - analyzeRecalibratedStarsPhotometricRefMatch
    description: |
      A step that runs visit-level multi-detector calibration tasks and then
      recalibrates the initial stars catalog and runs visit-level analysis
      on it.

      A visit constraint may be used for sharding and may be useful in speeding
      up QuantumGraph generation.

      An instrument constraint is generally redundant but recommended.

      A skymap constraint is generally redundant but recommended.

  2d-recalibration-tracts:
    subset:
      - analyzeRecalibratedStarAssociations
    description: |
      A step that runs tract-level analysis on associations between
      recalibrated stars (using the same associations originally computed on
      the initial stars).

      This step's outputs are not consumed by downstream steps and may be
      dropped by pipelines that don't need a checkpoint after multi-epoch
      calibration.

      A tract constraint may be used for sharding or avoiding partial-coverage
      tracts, and may be helpful in speeding up QuantumGraph generation.

      An instrument constraint is generally redundant but recommended.

      A skymap constraint is generally redundant but recommended.

  2e-recalibration-global:
    subset:
      - makeVisitDetectorTable
      - makeVisitTable
      - makeAnalysisRecalibratedStarAssociationsMetricTable
      - makeAnalysisRecalibratedStarAssociationsSkyPlot
    description: |
      A step that consolidates final visit[, detector] metadata and analysis
      into full-survey tables.

      This step's outputs are not consumed by downstream steps and may be
      dropped by pipelines that don't need a checkpoint after multi-epoch
      calibration.

      An instrument constraint is generally redundant but recommended.

      A skymap constraint is generally redundant but recommended.

  3a-coadds-tracts:
    subset: []
  3b-coadds-global:
    subset: []

  # TODO[DM-47320]: allow defining labeled subsets via other labeled subsets,
  # define top-level steps here.
