description: |
  Plots and metrics to assess coadd and object table quality.  This includes
  both tract-level plots and metrics and survey-level aggregations of those.
imports:
  - location: $ANALYSIS_TOOLS_DIR/pipelines/coaddQualityCore.yaml
  - location: $ANALYSIS_TOOLS_DIR/pipelines/coaddColumnValidate.yaml
  - location: $ANALYSIS_TOOLS_DIR/pipelines/wholeSkyCore.yaml
    include:
      - makeMetricTableObjectTableCore
      - makeMetricTableObjectParentTableCore
      - objectTableCoreWholeSkyPlot
      - objectParentTableCoreWholeSkyPlot
      - makeMetricTableObjectTableCoreRefCatMatch
      - objectTableCoreRefCatMatchWholeSkyPlot
      - makeAggregatedDeepCoaddMaskFractionsTable
      - aggregatedDeepCoaddMaskFractionsWholeSkyPlot
      - makeAggregatedTemplateCoaddMaskFractionsTable
      - aggregatedTemplateCoaddMaskFractionsWholeSkyPlot
  - location: $ANALYSIS_TOOLS_DIR/pipelines/surveyQualityCore.yaml
tasks:
  analyzeObjectTableCore:
    class: lsst.analysis.tools.tasks.ObjectTableTractAnalysisTask
    config:
      connections.data: object_all
      connections.inputName: object
      connections.outputName: object
  makeMetricTableObjectTableCore:
    class: lsst.analysis.tools.tasks.MakeMetricTableTask
    config:
      connections.metricBundleName: "object_metrics"
      connections.metricTable: "object_metrics_table"
  objectTableCoreWholeSkyPlot:
    class: lsst.analysis.tools.tasks.WholeSkyAnalysisTask
    config:
      connections.inputName: "object_metrics_table"
      connections.outputName: "object_whole_sky"
  analyzeObjectParentTableCore:
    class: lsst.analysis.tools.tasks.ObjectTableTractAnalysisTask
    config:
      connections.data: object_parent
      connections.inputName: object_parent
      connections.outputName: object_parent
  makeMetricTableObjectParentTableCore:
    class: lsst.analysis.tools.tasks.MakeMetricTableTask
    config:
      connections.metricBundleName: "object_parent_metrics"
      connections.metricTable: "object_parent_metrics_table"
  objectParentTableCoreWholeSkyPlot:
    class: lsst.analysis.tools.tasks.WholeSkyAnalysisTask
    config:
      connections.inputName: "object_parent_metrics_table"
      connections.outputName: "object_parent_whole_sky"
  analyzeObjectTableSurveyCore:
    class: lsst.analysis.tools.tasks.ObjectTableSurveyAnalysisTask
    config:
      connections.data: object_all
      connections.input: deep
      connections.outputName: object_survey
  catalogMatchTract:
    class: lsst.analysis.tools.tasks.astrometricCatalogMatch.AstrometricCatalogMatchTask
    config:
      connections.catalog: object_all
      connections.targetCatalog: object
      # Drop explicit refcat name from template to avoid needing to set it in
      # downstream task configs.
      connections.matchedCatalog: "{targetCatalog}_ref_match_astrom"
  refCatObjectTract:
    class: lsst.analysis.tools.tasks.refCatObjectAnalysis.RefCatObjectAnalysisTask
    config:
      connections.targetCatalog: object
      connections.data: "{targetCatalog}_ref_match_astrom"
      # Can't use {targetCatalog} in outputName because it is a template.
      connections.outputName: "object_ref_match_astrom"
  makeMetricTableObjectTableCoreRefCatMatch:
    class: lsst.analysis.tools.tasks.MakeMetricTableTask
    config:
      connections.metricBundleName: "object_ref_match_astrom_metrics"
      connections.metricTable: "object_ref_match_astrom_metrics_table"
  objectTableCoreRefCatMatchWholeSkyPlot:
    class: lsst.analysis.tools.tasks.WholeSkyAnalysisTask
    config:
      connections.inputName: "object_ref_match_astrom_metrics_table"
      connections.outputName: "object_ref_match_astrom_whole_sky"
  photometricCatalogMatch:
    class: lsst.analysis.tools.tasks.photometricCatalogMatch.PhotometricCatalogMatchTask
    config:
      connections.catalog: object_all
      connections.targetCatalog: object
      # Drop explicit refcat name from template to avoid needing to set it in
      # downstream task configs.
      connections.matchedCatalog: "{targetCatalog}_ref_match_photom"
  photometricRefCatObjectTract:
    class: lsst.analysis.tools.tasks.refCatObjectPhotometricAnalysis.RefCatObjectPhotometricAnalysisTask
    config:
      connections.targetCatalog: object
      connections.data: "{targetCatalog}_ref_match_photom"
      # Can't use {targetCatalog} in outputName because it is a template.
      connections.outputName: "object_ref_match_photom"
  plotPropertyMapTract:
    class: lsst.analysis.tools.tasks.PerTractPropertyMapAnalysisTask
  makeBinnedDeepCoaddImage:
    class: lsst.analysis.tools.tasks.MakeBinnedCoaddTask
    config:
      connections.coadd: deep_coadd
      connections.binnedCoadd: deep_coadd_bin
  makeWholeTractDeepCoaddImage:
    class: lsst.analysis.tools.tasks.WholeTractImageAnalysisTask
    config:
      connections.data: deep_coadd_bin
      connections.outputName: deep
  aggregateDeepCoaddMaskFractions:
    class: lsst.analysis.tools.tasks.WholeTractMaskFractionAnalysisTask
    config:
      connections.data: deep_coadd_bin
      connections.outputName: deep_coadd_tract_mask_fraction
      file: $ANALYSIS_TOOLS_DIR/config/wholeTractMaskFractionMetrics.py
  makeAggregatedDeepCoaddMaskFractionsTable:
    class: lsst.analysis.tools.tasks.MakeMetricTableTask
    config:
      connections.metricBundleName: "deep_coadd_tract_mask_fraction_metrics"
      connections.outputTableName: "deep_coadd_tract_mask_fraction_metricsTable"
      inputDataDimensions: ["skymap", "tract", "band"]
      outputTableDimensions: ["skymap", "band"]
  aggregatedDeepCoaddMaskFractionsWholeSkyPlot:
    class: lsst.analysis.tools.tasks.WholeSkyAnalysisTask
    config:
      connections.data: "deep_coadd_tract_mask_fraction_metricsTable"
      connections.outputName: "deep_coadd"
      inputDimensions: ["skymap", "band"]
      outputDimensions: ["skymap", "band"]
      file: $ANALYSIS_TOOLS_DIR/config/aggregatedMaskFractionsWholeSkyPlot.py
  makeBinnedDeepCoaddNImage:
    class: lsst.analysis.tools.tasks.MakeBinnedCoaddTask
    config:
      connections.coadd: "deep_coadd_n_image"
      connections.binnedCoadd: "deep_coadd_n_image_bin"
  makeWholeTractDeepCoaddNImage:
    class: lsst.analysis.tools.tasks.WholeTractImageAnalysisTask
    config:
      connections.data: "deep_coadd_n_image_bin"
      connections.outputName: "deep"
  makeBinnedPrettyCoaddImage:
    class: lsst.analysis.tools.tasks.MakeBinnedCoaddTask
    config:
      connections.coadd: pretty_coadd
      connections.binnedCoadd: pretty_coadd_bin
      binFactor: 16
      doBinInnerBBox: True
  makeWholeTractPrettyCoaddImage:
    class: lsst.analysis.tools.tasks.WholeTractImageAnalysisTask
    config:
      connections.data: pretty_coadd_bin
      connections.outputName: pretty
      atools.coaddImage: WholeTractImageTool
      atools.clippedMask: WholeTractClippedMaskTool
      atools.coaddImagePostageStamp: WholeTractPostageStampTool
      python: |
        from lsst.analysis.tools.atools import *
  aggregatePrettyCoaddMaskFractions:
    class: lsst.analysis.tools.tasks.WholeTractMaskFractionAnalysisTask
    config:
      connections.data: pretty_coadd_bin
      connections.outputName: pretty_coadd_tract_mask_fraction
      file: $ANALYSIS_TOOLS_DIR/config/wholeTractMaskFractionMetrics.py
  makeBinnedPrettyCoaddNImage:
    class: lsst.analysis.tools.tasks.MakeBinnedCoaddTask
    config:
      connections.coadd: "pretty_coadd_n_image"
      connections.binnedCoadd: "pretty_coadd_n_image_bin"
      coaddStorageClass: ImageU
      binFactor: 16
      doBinInnerBBox: true
  makeWholeTractPrettyCoaddNImage:
    class: lsst.analysis.tools.tasks.WholeTractImageAnalysisTask
    config:
      connections.data: "pretty_coadd_n_image_bin"
      connections.outputName: "pretty"
      dataStorageClass: ImageU
      atools.nImage: WholeTractNImageTool
      python: |
        from lsst.analysis.tools.atools import *
  makeBinnedTemplateCoaddImage:
    class: lsst.analysis.tools.tasks.MakeBinnedCoaddTask
    config:
      connections.coadd: template_coadd
      connections.binnedCoadd: template_coadd_bin
      binFactor: 16
      doBinInnerBBox: True
  makeWholeTractTemplateCoaddImage:
    class: lsst.analysis.tools.tasks.WholeTractImageAnalysisTask
    config:
      connections.data: template_coadd_bin
      connections.outputName: template
      atools.coaddImage: WholeTractImageTool
      atools.clippedMask: WholeTractClippedMaskTool
      atools.coaddImagePostageStamp: WholeTractPostageStampTool
      python: |
        from lsst.analysis.tools.atools import *
  aggregateTemplateCoaddMaskFractions:
    class: lsst.analysis.tools.tasks.WholeTractMaskFractionAnalysisTask
    config:
      connections.data: template_coadd_bin
      connections.outputName: template_coadd_tract_mask_fraction
      file: $ANALYSIS_TOOLS_DIR/config/wholeTractMaskFractionMetrics.py
  makeAggregatedTemplateCoaddMaskFractionsTable:
    class: lsst.analysis.tools.tasks.MakeMetricTableTask
    config:
      connections.metricBundleName: "template_coadd_tract_mask_fraction_metrics"
      connections.outputTableName: "template_coadd_tract_mask_fraction_metricsTable"
      inputDataDimensions: ["skymap", "tract", "band"]
      outputTableDimensions: ["skymap", "band"]
  aggregatedTemplateCoaddMaskFractionsWholeSkyPlot:
    class: lsst.analysis.tools.tasks.WholeSkyAnalysisTask
    config:
      connections.data: "template_coadd_tract_mask_fraction_metricsTable"
      connections.outputName: "template_coadd"
      inputDimensions: ["skymap", "band"]
      outputDimensions: ["skymap", "band"]
      file: $ANALYSIS_TOOLS_DIR/config/aggregatedMaskFractionsWholeSkyPlot.py
  makeBinnedTemplateCoaddNImage:
    class: lsst.analysis.tools.tasks.MakeBinnedCoaddTask
    config:
      connections.coadd: "template_coadd_n_image"
      connections.binnedCoadd: "template_coadd_n_image_bin"
      coaddStorageClass: ImageU
      binFactor: 16
      doBinInnerBBox: true
  makeWholeTractTemplateCoaddNImage:
    class: lsst.analysis.tools.tasks.WholeTractImageAnalysisTask
    config:
      connections.data: "template_coadd_n_image_bin"
      connections.outputName: "template"
      dataStorageClass: ImageU
      atools.nImage: WholeTractNImageTool
      python: |
        from lsst.analysis.tools.atools import *
  plotPropertyMapSurvey:
    class: lsst.analysis.tools.tasks.SurveyWidePropertyMapAnalysisTask
  validateObjectTableCore:
    class: lsst.analysis.tools.tasks.ObjectTableTractAnalysisTask
    config:
      connections.data: object_all
      connections.outputName: object_column_validate
