description: |
  DRP Pipeline for OR5
  Complete pipeline includes step1,step2,step3,step4,step5,step6,step7
instrument: lsst.obs.lsst.LsstCamImSim
imports:
  - location: $DRP_PIPE_DIR/pipelines/_ingredients/LSSTCam-imSim/DRP.yaml
    labeledSubsetModifyMode: EDIT
    exclude:
      - matchObjectToTruth
      - compareObjectToTruth
      - diff_matched_analysis
subsets:
  step3a:
    subset:
      # Per-patch tasks
      - makeDirectWarp
      - makePsfMatchedWarp
      - selectDeepCoaddVisits
      - assembleCoadd
      - detection
      - mergeDetections
      - deblend
      - measure
      - mergeMeasurements
      - forcedPhotCoadd
      - fitDeepCoaddPsfGaussians
      - fitDeblendedObjectsSersic
      - transformObjectTable
      - writeObjectTable
      - selectGoodSeeingVisits
      - templateGen
  step3b:
    subset:
      # Per-tract Tasks
      - consolidateObjectTable
      - healSparsePropertyMaps
      - analyzeMatchedVisitCore
      - analyzeObjectTableCore
      - catalogMatchTract
      - refCatObjectTract
      - validateObjectTableCore
